<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 生日快乐！</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}

/* ---- 星星 ---- */
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* ---- 画布 ---- */
canvas#cf { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
canvas#bl { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }

/* ---- 主内容 ---- */
.main {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  gap: 20px;
}

/* ---- 蛋糕 ---- */
.cake-wrap {
  position: relative;
  animation: cakeBounce 2s ease-in-out infinite;
}
@keyframes cakeBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.cake { position: relative; width: 180px; height: 140px; }
.cake-body {
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 60px;
  background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%);
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(255,105,180,0.3);
}
.cake-body::after {
  content: "";
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 4px;
  background: repeating-linear-gradient(90deg, #fff 0px, #fff 8px, #f48fb1 8px, #f48fb1 16px);
  border-radius: 2px;
}
.cake-top {
  position: absolute; bottom: 56px; left: 50%;
  transform: translateX(-50%);
  width: 170px; height: 28px;
  background: linear-gradient(180deg, #ffccbc 0%, #ffab91 100%);
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(255,138,101,0.5);
}
.cherry {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 20px;
  background: radial-gradient(circle at 40% 35%, #ff5252, #b71c1c);
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(255,50,50,0.6);
}
.cherry::after {
  content: "";
  position: absolute; top: -10px; left: 50%;
  width: 2px; height: 12px;
  background: #4caf50;
  border-radius: 1px;
}

/* ---- 蜡烛 ---- */
.candles {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 18px;
}
.candle {
  position: relative;
  width: 12px; height: 40px;
  background: linear-gradient(180deg, #ffe082 0%, #ffb74d 100%);
  border-radius: 4px 4px 2px 2px;
  box-shadow: 0 4px 12px rgba(255,183,77,0.5);
  animation: candleGlow 0.8s ease-in-out infinite alternate;
  animation-delay: var(--cd);
}
@keyframes candleGlow {
  0% { box-shadow: 0 4px 12px rgba(255,183,77,0.3); }
  100% { box-shadow: 0 4px 24px rgba(255,183,77,0.8), 0 0 40px rgba(255,160,0,0.4); }
}
.candle::after {
  content: "";
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 22px;
  background: radial-gradient(ellipse at center, #ff9800 20%, #ff5722 70%, transparent 70%);
  border-radius: 50% 50% 40% 40%;
  animation: flicker 0.3s ease-in-out infinite alternate;
  animation-delay: var(--cd);
}
@keyframes flicker {
  0% { transform: translateX(-50%) scaleY(1) scaleX(1); opacity: 0.9; }
  100% { transform: translateX(-50%) scaleY(1.2) scaleX(0.8); opacity: 0.6; }
}

/* ---- 文字 ---- */
.text-group { text-align: center; }
.title {
  font-size: 56px; font-weight: 900;
  background: linear-gradient(90deg, #ff6f00, #ff4081, #7c4dff, #00e5ff, #ff6f00);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 4s linear infinite;
  filter: drop-shadow(0 0 30px rgba(255,105,180,0.6));
}
@keyframes rainbow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}
.subtitle {
  font-size: 22px; color: rgba(255,255,255,0.8);
  margin-top: 8px;
  letter-spacing: 4px;
  animation: fadeInUp 1.5s ease forwards;
  animation-delay: 0.5s; opacity: 0;
}
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ---- 按钮 ---- */
.blow-btn {
  margin-top: 12px;
  padding: 14px 48px;
  font-size: 18px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #ff6f00, #ff4081);
  border: none; border-radius: 50px;
  cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 8px 30px rgba(255,64,129,0.5);
  transition: all 0.3s ease;
  animation: pulse 2s ease-in-out infinite;
}
.blow-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 40px rgba(255,64,129,0.7);
}
.blow-btn:active { transform: scale(0.96); }
@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 30px rgba(255,64,129,0.5); }
  50% { box-shadow: 0 8px 50px rgba(255,64,129,0.85); }
}

/* ---- 响应式 ---- */
@media (max-width: 600px) {
  .title { font-size: 36px; }
  .subtitle { font-size: 16px; }
  .cake { transform: scale(0.8); }
}
</style>
</head>
<body>

<!-- 星星背景 -->
<div class="stars" id="stars"></div>

<!-- 粒子画布 -->
<canvas id="cf"></canvas>
<canvas id="bl"></canvas>

<!-- 主内容 -->
<div class="main">
  <div class="cake-wrap">
    <div class="cake">
      <div class="candles">
        <div class="candle" style="--cd:0s"></div>
        <div class="candle" style="--cd:0.3s"></div>
        <div class="candle" style="--cd:0.6s"></div>
      </div>
      <div class="cake-top"><div class="cherry"></div></div>
      <div class="cake-body"></div>
    </div>
  </div>
  <div class="text-group">
    <div class="title">Happy Birthday</div>
    <div class="subtitle">✨ 愿所有美好如期而至 ✨</div>
  </div>
  <button class="blow-btn" id="blowBtn" onclick="blowCandles()">🎉 吹蜡烛 🎉</button>
</div>

<script>
// ============ 星空 ============
(function() {
  var stars = document.getElementById("stars");
  for (var i = 0; i < 120; i++) {
    var star = document.createElement("div");
    star.className = "star";
    var size = Math.random() * 3 + 1;
    star.style.cssText = "left:" + Math.random() * 100 + "%;top:" + Math.random() * 100 + "%;width:" + size + "px;height:" + size + "px;--dur:" + (Math.random() * 3 + 2) + "s;--delay:" + (Math.random() * 5) + "s";
    stars.appendChild(star);
  }
})();

// ============ 彩带烟花粒子 ============
(function() {
  var canvas = document.getElementById("cf");
  var ctx = canvas.getContext("2d");
  var W, H;
  var particles = [];
  var colors = ["#ff6f00", "#ff4081", "#7c4dff", "#00e5ff", "#ffea00", "#76ff03", "#ff1744"];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function Particle(x, y, vx, vy, color, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = 1;
    this.decay = Math.random() * 0.015 + 0.005;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.2;
  }
  Particle.prototype.update = function() {
    this.x += this.vx;
    this.vy += 0.04;
    this.y += this.vy;
    this.vx *= 0.995;
    this.life -= this.decay;
    this.rot += this.rotSpeed;
  };
  Particle.prototype.draw = function(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
    ctx.restore();
  };

  function burst(x, y, count) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 6 + 2;
      particles.push(new Particle(
        x, y,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed - 3,
        colors[Math.floor(Math.random() * colors.length)],
        Math.random() * 8 + 4
      ));
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (var i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw(ctx);
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
    requestAnimationFrame(animate);
  }

  // 初始烟花
  setTimeout(function() { burst(W / 2, H / 2, 80); }, 300);
  setTimeout(function() { burst(W * 0.3, H * 0.4, 60); }, 600);
  setTimeout(function() { burst(W * 0.7, H * 0.3, 60); }, 900);

  // 持续小烟花
  setInterval(function() {
    if (particles.length < 200) {
      burst(Math.random() * W, Math.random() * H * 0.5, 30);
    }
  }, 2500);

  animate();
})();

// ============ 气球漂浮 ============
(function() {
  var canvas = document.getElementById("bl");
  var ctx = canvas.getContext("2d");
  var W, H;
  var balloons = [];
  var balloonColors = ["#ff4081", "#7c4dff", "#00e5ff", "#ff6f00", "#76ff03", "#ffea00", "#ff5252"];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function Balloon() {
    this.reset(true);
  }
  Balloon.prototype.reset = function(init) {
    this.x = Math.random() * W;
    this.y = init ? H + 60 : H + 40;
    this.color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
    this.size = Math.random() * 30 + 22;
    this.speed = Math.random() * 1.2 + 0.6;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.02 + 0.01;
    this.amplitude = Math.random() * 25 + 10;
  };
  Balloon.prototype.update = function() {
    this.y -= this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.5;
    if (this.y < -80) this.reset(false);
  };
  Balloon.prototype.draw = function(ctx) {
    ctx.save();
    ctx.translate(this.x + Math.sin(this.wobble) * this.amplitude, this.y);

    // 气球球体
    var grd = ctx.createRadialGradient(-4, -6, this.size * 0.1, 0, 0, this.size);
    grd.addColorStop(0, "rgba(255,255,255,0.5)");
    grd.addColorStop(0.5, this.color);
    grd.addColorStop(1, "rgba(0,0,0,0.2)");
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * 1.15, 0, 0, Math.PI * 2);
    ctx.fill();

    // 结
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.beginPath();
    ctx.moveTo(-4, this.size + 4);
    ctx.lineTo(4, this.size + 4);
    ctx.lineTo(0, this.size + 12);
    ctx.closePath();
    ctx.fill();

    // 绳子
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, this.size + 12);
    ctx.quadraticCurveTo(8, this.size + 40, 2, this.size + 70);
    ctx.stroke();

    ctx.restore();
  };

  for (var i = 0; i < 12; i++) {
    balloons.push(new Balloon());
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < balloons.length; i++) {
      balloons[i].update();
      balloons[i].draw(ctx);
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// ============ 吹蜡烛 ============
var candlesBlown = false;
function blowCandles() {
  if (candlesBlown) return;
  candlesBlown = true;

  // 隐藏蜡烛
  var candles = document.querySelectorAll(".candle");
  for (var i = 0; i < candles.length; i++) {
    candles[i].style.transition = "opacity 0.5s ease, transform 0.5s ease";
    candles[i].style.opacity = "0";
    candles[i].style.transform = "translateY(-20px) scale(0.3)";
  }

  // 按钮变化
  var btn = document.getElementById("blowBtn");
  btn.textContent = "🎊 生日快乐！🎊";
  btn.style.background = "linear-gradient(135deg, #7c4dff, #00e5ff)";
  btn.style.pointerEvents = "none";
  btn.style.animation = "none";

  // 大爆发
  var cv = document.getElementById("cf");
  var W = cv.width, H = cv.height;
  var burstColors = ["#ff6f00", "#ff4081", "#7c4dff", "#00e5ff", "#ffea00", "#76ff03", "#ff1744"];

  for (var j = 0; j < 5; j++) {
    (function(delay) {
      setTimeout(function() {
        var ctx2 = cv.getContext("2d");
        var pts = [];
        for (var k = 0; k < 100; k++) {
          var angle = Math.random() * Math.PI * 2;
          var spd = Math.random() * 8 + 4;
          pts.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.5,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 5,
            life: 1,
            color: burstColors[Math.floor(Math.random() * burstColors.length)],
            size: Math.random() * 6 + 3
          });
        }
        function drawBurst() {
          for (var m = 0; m < pts.length; m++) {
            var p = pts[m];
            p.x += p.vx; p.vy += 0.06; p.y += p.vy;
            p.vx *= 0.99; p.life -= 0.007;
            if (p.life > 0) {
              ctx2.save();
              ctx2.globalAlpha = p.life;
              ctx2.fillStyle = p.color;
              ctx2.fillRect(p.x - p.size / 2, p.y - p.size / 4, p.size, p.size / 2);
              ctx2.restore();
            }
          }
        }
        var iv = setInterval(function() {
          drawBurst();
          var allDone = true;
          for (var n = 0; n < pts.length; n++) {
            if (pts[n].life > 0) { allDone = false; break; }
          }
          if (allDone) clearInterval(iv);
        }, 16);
      }, delay);
    })(j * 200);
  }

  // 生日音效
  try {
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    var ac = new AudioContext();
    var notes = [523, 659, 784, 1047];
    for (var n = 0; n < notes.length; n++) {
      (function(freq, idx) {
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.15, ac.currentTime + idx * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + idx * 0.15 + 0.4);
        osc.start(ac.currentTime + idx * 0.15);
        osc.stop(ac.currentTime + idx * 0.15 + 0.4);
      })(notes[n], n);
    }
  } catch(e) {}
}
</script>

</body>
</html>
